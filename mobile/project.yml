name: ReconCompanion
options:
  bundleIdPrefix: com.nicolasdossantos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "9KHR566436"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "5"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.0

targets:
  ReconCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - framework: Frameworks/cactus.xcframework
        embed: true
        codeSign: true
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolasdossantos.skyguardian
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SkyGuardian
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Plain ws:// to the laptop on the local network needs both of these.
        NSLocalNetworkUsageDescription: "Connects to the mission laptop on your local network."
        NSLocationWhenInUseUsageDescription: "Shares your relative position with the laptop for follow-me context."
        NSMicrophoneUsageDescription: "Voice commands to the companion drone, processed on-device."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Only standard/exempt encryption (plain local ws) — avoids the TestFlight compliance prompt.
        ITSAppUsesNonExemptEncryption: false

  ReconCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ReconCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolasdossantos.skyguardian.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  ReconCompanion:
    build:
      targets:
        ReconCompanion: all
        ReconCompanionTests: [test]
    test:
      targets:
        - ReconCompanionTests
