name: ReconCompanion
options:
  bundleIdPrefix: com.nicolasdossantos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "9KHR566436"
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "26"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.0

targets:
  ReconCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Vendor/apriltag        # vendored AprilTag C lib, compiled in-target for iOS
      - path: Resources              # bundled CoreML model (yolov8n.mlpackage) for on-device detection
    dependencies:
      - framework: Frameworks/cactus.xcframework
        embed: true
        codeSign: true
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolasdossantos.skyguardian
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sources/SkyGuardian-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/apriltag
        # Also pass the AprilTag include path straight to the Swift driver's clang
        # importer. Xcode 16/26's bridging-header dependency scanner does not honor
        # HEADER_SEARCH_PATHS for the bridging header's quoted sub-path includes
        # (e.g. #import "common/image_u8.h"), so CLI `xcodebuild test` fails to find
        # it without this. Redundant for the IDE; required for command-line test runs.
        OTHER_SWIFT_FLAGS: -Xcc -I$(SRCROOT)/Vendor/apriltag
        # The explicit-module bridging-header dependency scanner ignores the
        # include path above and fails on the quoted sub-path import; disable it
        # so the bridging header compiles with normal search paths.
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
        # Vendored C emits many benign warnings; don't let them drown the build log.
        GCC_WARN_INHIBIT_ALL_WARNINGS: "YES"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SkyGuardian
        # Wire the bundle version to the build settings so bumping CURRENT_PROJECT_VERSION
        # in this file actually changes the uploaded build number (xcodegen otherwise
        # regenerates this plist with a default CFBundleVersion of 1).
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Plain ws:// to the laptop on the local network needs both of these.
        NSLocalNetworkUsageDescription: "Connects to the mission laptop on your local network."
        NSLocationWhenInUseUsageDescription: "Shares your relative position with the laptop for follow-me context."
        NSMicrophoneUsageDescription: "Voice commands to the companion drone, processed on-device."
        NSSpeechRecognitionUsageDescription: "Recognizes your spoken drone commands on-device, fully offline."
        NSCameraUsageDescription: "Reads the launch anchor marker to align the map with the mission laptop."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Only standard/exempt encryption (plain local ws) — avoids the TestFlight compliance prompt.
        ITSAppUsesNonExemptEncryption: false

  ReconCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ReconCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicolasdossantos.skyguardian.tests
        GENERATE_INFOPLIST_FILE: "YES"
        # `@testable import ReconCompanion` makes the test target process the app's
        # bridging header, whose quoted sub-path imports (e.g. "common/image_u8.h")
        # the explicit-module scanner can't resolve. Mirror the app target's AprilTag
        # include flags so `xcodebuild test` from the CLI builds the test bundle.
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/apriltag
        OTHER_SWIFT_FLAGS: -Xcc -I$(SRCROOT)/Vendor/apriltag
        SWIFT_ENABLE_EXPLICIT_MODULES: "NO"

schemes:
  ReconCompanion:
    build:
      targets:
        ReconCompanion: all
        ReconCompanionTests: [test]
    test:
      targets:
        - ReconCompanionTests
