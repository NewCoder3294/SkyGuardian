# SkyGuardian — local RTMP relay (MediaMTX). Offline / LAN-only, no cloud.
#
# Flow:  [ Mavic publisher: DJI HDMI capture / DJI app / ffmpeg ]
#          --RTMP--> rtmp://<laptop-lan-ip>:1935/live
#                    --> MediaMTX (this relay) --> backend reads loopback
#                        rtmp://127.0.0.1:1935/live --> JPEG --> dashboard
#
# The backend (MAVIC_SOURCE / the dashboard "RTMP" button) reads the `live`
# path by default, so that path is defined explicitly below. `all_others`
# accepts any other publish path too (e.g. live/test) for flexibility.

logLevel: info

api: yes
# Loopback-only: the admin/control API is for local diagnostics, never a LAN
# consumer. Binding to all interfaces would expose path control to anyone on
# the network.
apiAddress: 127.0.0.1:9997

rtsp: no
hls: no
webrtc: no
srt: no

rtmp: yes
# Loopback-only: only a publisher running ON THIS LAPTOP can push (the canonical
# setup per docs/DEMO.md — DJI HDMI capture / DJI app on the laptop). Prevents an
# unauthenticated LAN host from pushing a spoofed Mavic feed. To allow a publisher
# on another LAN device, switch to credentialed publish (publishUser/publishPass)
# instead of opening this bind.
rtmpAddress: 127.0.0.1:1935

paths:
  # The ONLY path. The backend reads rtmp://127.0.0.1:1935/live; no catch-all,
  # so arbitrary publish paths are rejected (smaller attack surface).
  live:
    source: publisher
